<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisDefesa | Login</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 100px;">
        <div class="card">
            <h1 style="text-align: center; color: var(--gold);"><i class="fas fa-lock"></i> Login no Sistema</h1>
            <form id="loginForm">
                <label for="email"><strong>Email:</strong></label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>

                <label for="senha"><strong>Senha:</strong></label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" required>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Entrar</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Não tem conta? <a href="registro.html">Registre-se aqui</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, senha})
            });

            const data = await res.json();
            if (data.success) {
                alert('Login realizado com sucesso!');
                window.location.href = 'index.html';
            } else {
                alert(data.message || 'Erro no login');
            }
        });
    </script>
</body>
</html>
