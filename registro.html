<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisDefesa | Registro</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 80px;">
        <div class="card">
            <h1 style="text-align: center; color: var(--gold);"><i class="fas fa-user-plus"></i> Registro de Cliente</h1>
            <form id="registroForm">
                <label for="nome"><strong>Nome Completo:</strong></label>
                <input type="text" id="nome" required>

                <label for="email"><strong>Email:</strong></label>
                <input type="email" id="email" required>

                <label for="senha"><strong>Senha:</strong></label>
                <input type="password" id="senha" required>

                <label for="cpf"><strong>CPF:</strong></label>
                <input type="text" id="cpf" required>

                <label for="telefone"><strong>Telefone:</strong></label>
                <input type="tel" id="telefone" required>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Registrar</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Já tem conta? <a href="login.html">Faça login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const cpf = document.getElementById('cpf').value;
            const telefone = document.getElementById('telefone').value;

            const res = await fetch('/registrar-cliente', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nome, email, senha, cpf, telefone})
            });

            const data = await res.json();
            if (data.success) {
                alert('Registro realizado com sucesso! Faça login.');
                window.location.href = 'login.html';
            } else {
                alert(data.message || 'Erro no registro');
            }
        });
    </script>
</body>
</html>
